name: Feed Watch

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

jobs:
  poll:
    name: Poll subscribed feeds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Normalize source inventory
        run: python3 scripts/normalize_sources.py

      - name: Refresh feed snapshot
        run: python3 scripts/check_feed_updates.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            archive/sources/source-inventory.json \
            archive/sources/source-inventory.md \
            archive/sources/feed-state.json \
            archive/sources/feed-report.md \
            archive/sources/pending-review.md
          if git diff --cached --quiet; then
            echo "No changes — feed is up to date."
          else
            git commit -m "chore: refresh source inventory [skip ci]"
            git push
          fi
